<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Sarthak Chhabra</title>
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#050608">
    <link rel="icon" href="./assets/images/logo.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/site.css">
</head>

<body class="noise">
    <canvas id="constellation" aria-hidden="true"></canvas>

    <main class="page err-wrap">
        <p class="kicker" style="justify-content:center">error · route not found</p>
        <div class="err-code grad-text">404</div>
        <p class="section-sub" style="margin:8px auto 0; text-align:center">This endpoint doesn't exist — even my routing engine has its limits.</p>
        <div class="terminal" style="margin:36px auto 0; max-width:520px; text-align:left">
            <div class="terminal-bar">
                <span class="t-dot r"></span><span class="t-dot y"></span><span class="t-dot g"></span>
                <span class="terminal-title">sarthak@prod: ~/router</span>
            </div>
            <div class="terminal-body" style="min-height:0">
                <div><span class="t-prompt">$</span> <span class="t-cmd">resolve <span id="bad-path">/this-page</span></span></div>
                <div class="t-out">⚠ no provider matched · fallback engaged</div>
                <div class="t-out">→ rerouting to <span class="t-accent">/</span> <span class="t-cursor"></span></div>
            </div>
        </div>
        <div class="btn-row" style="margin-top:40px">
            <a class="btn btn-primary" href="/">Back to home</a>
            <a class="btn btn-ghost" href="/contact.html">Report this</a>
        </div>
    </main>

    <script src="./assets/js/site.js" defer></script>
    <script>
        (function () {
            var el = document.getElementById("bad-path");
            if (el && location.pathname && location.pathname !== "/") {
                el.textContent = location.pathname.slice(0, 48);
            }
        })();
    </script>
</body>

</html>
